name: Telegram Bot

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 125
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install python-telegram-bot==21.9

      - name: Run bot
        run: python main2.py
